name: ci-frontend

on:
  push:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/ci-frontend.yml']
  pull_request:
    paths: ['frontend/**', '.github/workflows/ci-frontend.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci --no-audit --no-fund
      - run: cd frontend && npx prettier --check .
      - run: cd frontend && npx eslint . --max-warnings 0
      - run: cd frontend && npm test -- --watch=false --browsers=ChromeHeadless
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install playwright
      - run: cd frontend && npx playwright install --with-deps chromium
      - run: cd frontend && npx playwright test --grep @p1
