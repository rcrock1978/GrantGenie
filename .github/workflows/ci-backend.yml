name: ci-backend

on:
  push:
    branches: [main]
    paths: ['backend/**', '.github/workflows/ci-backend.yml']
  pull_request:
    paths: ['backend/**', '.github/workflows/ci-backend.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: grantgenie
          POSTGRES_PASSWORD: grantgenie
          POSTGRES_DB: grantgenie
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 5s
    env:
      APP_ENV: testing
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: grantgenie
      DB_USERNAME: grantgenie
      DB_PASSWORD: grantgenie
      REDIS_HOST: 127.0.0.1
      AI_SERVICE_URL: http://127.0.0.1:8001
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, intl, zip
          tools: composer:v2
      - run: cd backend && composer install --no-interaction --no-progress
      - run: cd backend && vendor/bin/pint --test
      - run: cd backend && vendor/bin/phpstan analyse --no-progress --memory-limit=2G
      - run: cd backend && vendor/bin/pest --parallel
      - name: SC-005 RLS isolation gate
        run: cd backend && vendor/bin/pest tests/Integration/Isolation
