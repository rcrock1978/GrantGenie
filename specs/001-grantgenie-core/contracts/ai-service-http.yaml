### POST /generate/proposal

Generate a full proposal draft from grant + tenant context.

**Request**:
```json
{
  "account_id": "uuid",
  "proposal_id": "uuid",
  "grant": {
    "id": "uuid",
    "title": "string",
    "funder_name": "string",
    "funder_requirements": { "page_limit": 10, "sections": ["summary", "need", "activities", "budget", "impact"] },
    "description": "string"
  },
  "org_profile": { /* OrgProfile DTO */ },
  "sections_to_generate": ["summary", "need_statement", "activities", "budget_narrative", "impact"],
  "model_preference": {
    "primary": "claude-sonnet-4-5",
    "fallbacks": ["gpt-4o", "claude-haiku-4-5"]
  }
}
```

**Response 200**:
```json
{
  "sections": [
    {
      "kind": "summary",
      "content": "string",
      "citations": [
        { "chunk_id": "uuid", "quote_span_start": 0, "quote_span_end": 240, "confidence": 0.91 }
      ]
    }
  ],
  "model_used": "claude-sonnet-4-5",
  "input_tokens": 42150,
  "output_tokens": 18432,
  "cost_cents": 178,
  "latency_ms": 4820,
  "prompt_injection_blocked": false
}
```

**Response 202 (queued)**:
```json
{ "job_id": "uuid", "status": "queued", "poll_url": "/generate/proposal/{job_id}" }
```

**Errors**:
- `422` eval gate failed (response includes `relevance` and `faithfulness` scores)
- `429` rate limited
- `503` all model tiers exhausted

