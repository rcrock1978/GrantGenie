### POST /eval/score

Run eval gates on a draft proposal.

**Request**:
```json
{
  "account_id": "uuid",
  "proposal_id": "uuid",
  "sections": [
    { "kind": "summary", "content": "string", "citations": [{ "chunk_id": "uuid" }] }
  ]
}
```

**Response 200**:
```json
{
  "relevance": 0.89,
  "faithfulness": 0.93,
  "passed": true,
  "thresholds": { "relevance": 0.85, "faithfulness": 0.90 },
  "failures": []
}
```

**Response 200 (failed)**:
```json
{
  "relevance": 0.78,
  "faithfulness": 0.92,
  "passed": false,
  "thresholds": { "relevance": 0.85, "faithfulness": 0.90 },
  "failures": [
    { "section": "summary", "issue": "low_relevance", "score": 0.78 }
  ]
}
```

