### POST /generate/budget-narrative

Generate narrative text for one or more budget line items.

**Request**:
```json
{
  "account_id": "uuid",
  "proposal_id": "uuid",
  "items": [
    { "category": "Personnel", "description": "Program Director (0.5 FTE)", "amount_cents": 6500000 }
  ],
  "funder_budget_categories": ["Personnel", "Fringe", "Supplies", "Travel", "Contractual", "Other"]
}
```

**Response 200**:
```json
{
  "narratives": [
    { "category": "Personnel", "narrative": "string" }
  ],
  "model_used": "gpt-4o-mini",
  "input_tokens": 1240,
  "output_tokens": 380,
  "cost_cents": 1,
  "latency_ms": 1820
}
```

