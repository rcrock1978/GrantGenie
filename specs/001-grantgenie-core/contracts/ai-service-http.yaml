### POST /safety/check

Apply prompt-injection defense and PII redaction to AI inputs and outputs.

**Request**:
```json
{
  "input_text": "string",
  "output_text": "string (optional)",
  "redact_pii": true
}
```

**Response 200**:
```json
{
  "safe_input": "string (sanitized)",
  "safe_output": "string (redacted)",
  "injection_detected": false,
  "pii_redacted": [
    { "type": "email", "count": 2, "positions": [[120, 145], [310, 340]] }
  ]
}
```

---

### GET /healthz

Liveness probe. Returns `200 {"status":"ok"}` if the process is alive.

### GET /readyz

Readiness probe. Returns `200 {"status":"ready"}` only when DB, Redis, and at least one model provider are reachable.
