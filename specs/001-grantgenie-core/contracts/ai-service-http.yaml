# AI Service Internal Contract (HTTP/JSON)

**Version**: 1.0
**Base URL**: `http://ai-service:8001/internal/v1` (k8s) or `http://localhost:8001/internal/v1` (local dev)
**Auth**: mTLS service mesh OR shared secret header `X-Internal-Auth: <bearer>` (dev only)
**Consumer**: GrantGenie Laravel backend (sole consumer; not exposed to public API)

## Endpoints

### POST /rag/retrieve

Retrieve the top-k most relevant document chunks for a query, scoped to a tenant.

**Request**:
```json
{
  "account_id": "uuid",
  "query": "string (≤ 2000 chars)",
  "top_k": 5,
  "rerank": true,
  "filters": {
    "document_ids": ["uuid", "..."],
    "min_relevance": 0.5
  }
}
```

**Response 200**:
```json
{
  "chunks": [
    {
      "id": "uuid",
      "document_id": "uuid",
      "document_title": "Annual Report 2025.pdf",
      "chunk_index": 12,
      "page_number": 4,
      "content": "string",
      "char_offset_start": 3420,
      "char_offset_end": 4015,
      "score": 0.87,
      "rerank_score": 0.92
    }
  ],
  "embedding_model": "text-embedding-3-small",
  "rerank_model": "bge-reranker-base",
  "latency_ms": 142
}
```

**Errors**:
- `400` invalid query
- `401` missing/invalid auth
- `429` rate limited (back off and retry)
- `503` all models exhausted (caller should enqueue)

